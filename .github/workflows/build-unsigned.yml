name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build Unsigned App
      run: |
        xcodebuild clean build \
          -project Zenith.xcodeproj \
          -scheme Zenith \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CONFIGURATION_BUILD_DIR=build/Release-iphoneos

    - name: Package into IPA
      run: |
        mkdir -p Payload
        mv build/Release-iphoneos/Zenith.app Payload/
        zip -r Zenith-Unsigned.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zenith-Unsigned-IPA
        path: Zenith-Unsigned.ipa
